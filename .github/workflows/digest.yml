name: Daily Digest

on:
  schedule:
    - cron: "0 7 * * *"   # 07:00 UTC daily - adjust to your timezone
  workflow_dispatch:        # manual trigger button

jobs:
  digest:
    runs-on: ubuntu-latest
    timeout-minutes: 15     # hard runtime cap
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install -r requirements.txt

      - name: Run digest pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          DIGEST_TO: ${{ secrets.DIGEST_TO }}
        run: python app/core.py

      - name: Commit metrics
        run: |
          git config user.name "digest-bot"
          git config user.email "bot@users.noreply.github.com"
          git add evolution/metrics.json
          git commit -m "metrics: daily run $(date -u +%F)" || echo "no changes"
          git push
